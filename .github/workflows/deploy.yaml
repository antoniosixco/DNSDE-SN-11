name: CI-Tests and Deploy

on:
  push:
    branches:
      - main
      - test-fail
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  deploy:
    name: Deploy to Render
    needs: test # CRÍTICO: Solo despliega si el job "test" fue exitoso
    runs-on: ubuntu-latest
    # Solo despliega cuando los cambios llegan a la rama principal (main)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deployment
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
